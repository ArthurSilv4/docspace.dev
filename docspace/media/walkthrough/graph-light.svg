<svg viewBox="0 0 600 320" width="600" height="320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,Segoe UI,sans-serif">
  <rect width="600" height="320" fill="#ffffff"/>

  <!-- card -->
  <rect x="80" y="44" width="440" height="232" rx="12" fill="#f7f7f7" stroke="#e0e0e0" stroke-width="1"/>

  <!-- mode pills -->
  <rect x="100" y="60" width="98" height="24" rx="12" fill="#005fb8"/>
  <text x="149" y="76" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Dependências</text>
  <rect x="206" y="60" width="56" height="24" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="234" y="76" text-anchor="middle" fill="#6e6e6e" font-size="11">Fluxo</text>
  <rect x="270" y="60" width="68" height="24" rx="12" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <text x="304" y="76" text-anchor="middle" fill="#6e6e6e" font-size="11">Impacto</text>

  <!-- edges -->
  <g stroke="#cfcfcf" stroke-width="1.3">
    <line x1="300" y1="120" x2="210" y2="165"/>
    <line x1="300" y1="120" x2="385" y2="160"/>
    <line x1="300" y1="120" x2="300" y2="210"/>
    <line x1="210" y1="165" x2="300" y2="210"/>
    <line x1="385" y1="160" x2="300" y2="210"/>
    <line x1="210" y1="165" x2="165" y2="225"/>
    <line x1="300" y1="210" x2="260" y2="255"/>
    <line x1="385" y1="160" x2="430" y2="220"/>
  </g>

  <!-- nodes -->
  <circle cx="210" cy="165" r="15" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>
  <circle cx="385" cy="160" r="16" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>
  <circle cx="300" cy="210" r="17" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>
  <circle cx="165" cy="225" r="13" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>
  <circle cx="430" cy="220" r="13" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>
  <circle cx="260" cy="255" r="11" fill="#ffffff" stroke="#8a8a8a" stroke-width="1.6"/>

  <!-- entry node -->
  <circle cx="300" cy="120" r="27" fill="none" stroke="#005fb8" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="120" r="20" fill="#ffffff" stroke="#005fb8" stroke-width="2.4"/>
</svg>
