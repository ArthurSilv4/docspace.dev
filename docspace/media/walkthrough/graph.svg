<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="600" height="320" fill="#1e1e2e"/>

  <!-- ── toolbar ── -->
  <rect width="600" height="38" fill="#252535"/>
  <!-- mode buttons -->
  <rect x="10" y="7" width="100" height="24" rx="3" fill="#89b4fa"/>
  <text x="60" y="23" text-anchor="middle" fill="#1e1e2e" font-size="11" font-weight="600">Dependências</text>
  <rect x="114" y="7" width="52" height="24" rx="3" fill="transparent"/>
  <text x="140" y="23" text-anchor="middle" fill="#6c7086" font-size="11">Fluxo</text>
  <rect x="170" y="7" width="60" height="24" rx="3" fill="transparent"/>
  <text x="200" y="23" text-anchor="middle" fill="#6c7086" font-size="11">Impacto</text>
  <!-- search -->
  <rect x="242" y="8" width="180" height="22" rx="3" fill="#313145"/>
  <text x="254" y="23" fill="#6c7086" font-size="11">Buscar arquivo…</text>
  <!-- buttons -->
  <rect x="432" y="8" width="36" height="22" rx="3" fill="#313145"/>
  <text x="450" y="22" text-anchor="middle" fill="#a6adc8" font-size="11">Fit</text>
  <rect x="473" y="8" width="50" height="22" rx="3" fill="#313145"/>
  <text x="498" y="22" text-anchor="middle" fill="#a6adc8" font-size="11">Refresh</text>
  <rect x="530" y="8" width="26" height="22" rx="3" fill="#313145"/>
  <text x="543" y="22" text-anchor="middle" fill="#a6adc8" font-size="11">…</text>

  <!-- ── graph edges ── -->
  <g stroke="#45475a" stroke-width="1.2" opacity="0.7">
    <!-- server → db -->
    <line x1="190" y1="155" x2="310" y2="210"/>
    <!-- server → auth -->
    <line x1="190" y1="155" x2="120" y2="220"/>
    <!-- index → server -->
    <line x1="300" y1="90" x2="200" y2="148"/>
    <!-- index → router -->
    <line x1="300" y1="90" x2="420" y2="130"/>
    <!-- router → server -->
    <line x1="413" y1="138" x2="202" y2="152"/>
    <!-- router → userCtrl -->
    <line x1="420" y1="138" x2="480" y2="200"/>
    <!-- userCtrl → db -->
    <line x1="474" y1="207" x2="316" y2="214"/>
    <!-- auth → db -->
    <line x1="128" y1="226" x2="306" y2="218"/>
    <!-- utils (isolated-ish) -->
    <line x1="202" y1="152" x2="160" y2="270"/>
    <line x1="316" y1="218" x2="160" y2="272"/>
  </g>

  <!-- ── nodes ── -->
  <!-- index.ts — entry (accent ring) -->
  <circle cx="300" cy="84" r="22" fill="#313145" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="300" y="88" text-anchor="middle" fill="#89b4fa" font-size="9" font-weight="600">index.ts</text>

  <!-- server.ts — blue -->
  <circle cx="190" cy="155" r="18" fill="#313145"/>
  <circle cx="190" cy="155" r="18" fill="#89b4fa" fill-opacity="0.15"/>
  <text x="190" y="159" text-anchor="middle" fill="#89b4fa" font-size="9">server.ts</text>

  <!-- router.ts — blue -->
  <circle cx="420" cy="134" r="16" fill="#313145"/>
  <circle cx="420" cy="134" r="16" fill="#89b4fa" fill-opacity="0.12"/>
  <text x="420" y="138" text-anchor="middle" fill="#89b4fa" font-size="9">router.ts</text>

  <!-- db.ts — green -->
  <circle cx="314" cy="215" r="20" fill="#313145"/>
  <circle cx="314" cy="215" r="20" fill="#a6e3a1" fill-opacity="0.15"/>
  <text x="314" y="219" text-anchor="middle" fill="#a6e3a1" font-size="9">db.ts</text>

  <!-- auth.ts — purple -->
  <circle cx="120" cy="224" r="16" fill="#313145"/>
  <circle cx="120" cy="224" r="16" fill="#cba6f7" fill-opacity="0.15"/>
  <text x="120" y="228" text-anchor="middle" fill="#cba6f7" font-size="9">auth.ts</text>

  <!-- userCtrl.ts — yellow -->
  <circle cx="478" cy="204" r="18" fill="#313145"/>
  <circle cx="478" cy="204" r="18" fill="#f9e2af" fill-opacity="0.15"/>
  <text x="478" y="200" text-anchor="middle" fill="#f9e2af" font-size="8">userCtrl</text>
  <text x="478" y="211" text-anchor="middle" fill="#f9e2af" font-size="8">.ts</text>

  <!-- utils.ts — muted -->
  <circle cx="156" cy="274" r="14" fill="#313145"/>
  <text x="156" y="278" text-anchor="middle" fill="#6c7086" font-size="8">utils.ts</text>

  <!-- external module: express -->
  <circle cx="370" cy="272" r="13" fill="#27273a" stroke="#45475a" stroke-width="1"/>
  <text x="370" y="276" text-anchor="middle" fill="#6c7086" font-size="8">express</text>
  <line x1="420" y1="150" x2="375" y2="260" stroke="#45475a" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- ── legend ── -->
  <rect x="492" y="260" width="100" height="52" rx="4" fill="#252535"/>
  <circle cx="507" cy="276" r="5" fill="#89b4fa" fill-opacity="0.3" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="516" y="279" fill="#6c7086" font-size="9">entrada</text>
  <circle cx="507" cy="293" r="5" fill="#313145" stroke="#45475a" stroke-width="1"/>
  <text x="516" y="296" fill="#6c7086" font-size="9">arquivo</text>
  <circle cx="507" cy="304" r="4" fill="#27273a" stroke="#45475a" stroke-width="1"/>
  <text x="516" y="308" fill="#6c7086" font-size="9">pacote externo</text>

  <!-- stats -->
  <text x="14" y="314" fill="#45475a" font-size="10">7 arquivos · 2 módulos · 10 conexões</text>
</svg>
