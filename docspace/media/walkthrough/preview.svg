<svg viewBox="0 0 600 320" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="600" height="320" fill="#1e1e2e"/>

  <!-- ── Left: editor pane ── -->
  <rect x="0" y="0" width="296" height="320" fill="#1e1e2e"/>
  <!-- tab bar -->
  <rect x="0" y="0" width="296" height="34" fill="#252535"/>
  <rect x="0" y="0" width="120" height="34" fill="#1e1e2e"/>
  <text x="14" y="22" fill="#a6adc8" font-size="12">API.md</text>
  <rect x="0" y="33" width="120" height="2" fill="#89b4fa"/>

  <!-- editor content (monospace) -->
  <text x="14" y="60"  fill="#f9e2af" font-size="11" font-family="monospace"># API Reference</text>
  <text x="14" y="80"  fill="#6c7086" font-size="11" font-family="monospace"> </text>
  <text x="14" y="96"  fill="#cdd6f4" font-size="11" font-family="monospace">Use the `POST /auth` endpoint</text>
  <text x="14" y="112" fill="#cdd6f4" font-size="11" font-family="monospace">to authenticate.</text>
  <text x="14" y="132" fill="#6c7086" font-size="11" font-family="monospace"> </text>
  <text x="14" y="148" fill="#cba6f7" font-size="11" font-family="monospace">## Endpoints</text>
  <text x="14" y="168" fill="#a6e3a1" font-size="11" font-family="monospace">- `GET /users`</text>
  <text x="14" y="184" fill="#a6e3a1" font-size="11" font-family="monospace">- `POST /auth`</text>
  <text x="14" y="200" fill="#a6e3a1" font-size="11" font-family="monospace">- `DELETE /session`</text>
  <text x="14" y="220" fill="#6c7086" font-size="11" font-family="monospace"> </text>
  <text x="14" y="236" fill="#cba6f7" font-size="11" font-family="monospace">## Fluxo</text>
  <text x="14" y="252" fill="#89b4fa" font-size="11" font-family="monospace">```mermaid</text>
  <text x="14" y="268" fill="#cdd6f4" font-size="11" font-family="monospace">sequenceDiagram</text>
  <text x="14" y="284" fill="#cdd6f4" font-size="11" font-family="monospace">  Client->>API: POST /auth</text>
  <text x="14" y="300" fill="#89b4fa" font-size="11" font-family="monospace">```</text>

  <!-- divider -->
  <rect x="297" y="0" width="2" height="320" fill="#313145"/>
  <rect x="296" y="140" width="4" height="40" rx="2" fill="#89b4fa" opacity="0.6"/>

  <!-- ── Right: preview pane ── -->
  <rect x="300" y="0" width="300" height="320" fill="#27273a"/>
  <!-- tab bar -->
  <rect x="300" y="0" width="300" height="34" fill="#252535"/>
  <rect x="300" y="0" width="140" height="34" fill="#27273a"/>
  <text x="314" y="22" fill="#a6adc8" font-size="12">Preview — API.md</text>
  <rect x="300" y="33" width="140" height="2" fill="#89b4fa"/>

  <!-- rendered content -->
  <text x="318" y="62" fill="#cdd6f4" font-size="18" font-weight="700">API Reference</text>
  <text x="318" y="84" fill="#a6adc8" font-size="12">Use the </text>
  <rect x="385" y="73" width="80" height="16" rx="3" fill="#313145"/>
  <text x="393" y="84" fill="#f38ba8" font-size="11" font-family="monospace">POST /auth</text>
  <text x="468" y="84" fill="#a6adc8" font-size="12"> endpoint</text>
  <text x="318" y="100" fill="#a6adc8" font-size="12">to authenticate.</text>

  <text x="318" y="124" fill="#cdd6f4" font-size="15" font-weight="600">Endpoints</text>
  <rect x="318" y="115" width="3" height="16" rx="1" fill="#89b4fa"/>

  <text x="330" y="144" fill="#a6adc8" font-size="12">• GET /users</text>
  <text x="330" y="160" fill="#a6adc8" font-size="12">• POST /auth</text>
  <text x="330" y="176" fill="#a6adc8" font-size="12">• DELETE /session</text>

  <text x="318" y="202" fill="#cdd6f4" font-size="15" font-weight="600">Fluxo</text>
  <rect x="318" y="193" width="3" height="16" rx="1" fill="#89b4fa"/>

  <!-- mermaid diagram mockup -->
  <rect x="314" y="212" width="270" height="90" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1"/>
  <!-- Client box -->
  <rect x="332" y="228" width="60" height="22" rx="3" fill="#313145" stroke="#89b4fa" stroke-width="1"/>
  <text x="362" y="243" text-anchor="middle" fill="#89b4fa" font-size="10">Client</text>
  <!-- API box -->
  <rect x="492" y="228" width="60" height="22" rx="3" fill="#313145" stroke="#a6e3a1" stroke-width="1"/>
  <text x="522" y="243" text-anchor="middle" fill="#a6e3a1" font-size="10">API</text>
  <!-- arrow -->
  <line x1="392" y1="239" x2="491" y2="239" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="441" y="232" text-anchor="middle" fill="#6c7086" font-size="9">POST /auth</text>
  <!-- return arrow -->
  <line x1="491" y1="268" x2="392" y2="268" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="441" y="280" text-anchor="middle" fill="#6c7086" font-size="9">200 OK + token</text>

  <defs>
    <marker id="arr" markerWidth="6" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6c7086"/>
    </marker>
  </defs>
</svg>
